<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StageMaster - Preview Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            display: flex; 
            flex-direction: column; 
            font-family: sans-serif; 
            background-color: #1a1a1a;
            overflow: hidden; 
        }
        
        #top-pane { 
            height: 50%; 
            border-bottom: 4px solid #bf953f; 
            padding: 10px; 
            box-sizing: border-box; 
            background: #2d2d2d;
            position: relative;
        }
        
        #bottom-pane { 
            height: 50%; 
            width: 100%;
            position: relative;
        }
        
        canvas { 
            width: 100% !important; 
            height: 100% !important; 
        }

        /* --- THE HUD OVERLAY --- */
        #hud-box {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(20, 20, 20, 0.85);
            border: 2px solid #bf953f;
            border-radius: 12px;
            padding: 10px 15px;
            color: white;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: none;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            font-size: 1.1rem;
        }

        .hud-label {
            color: #aaa;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        
        .hud-value {
            color: #fbbc05;
            font-family: monospace;
            font-size: 1.3rem;
        }

        /* Smooth rotation for the car marker */
        .car-icon-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            transition: transform 0.1s linear; 
            background-color: transparent; 
        }
    </style>
</head>
<body>
    
    <div id="top-pane">
        <canvas id="altitudeChart"></canvas>
    </div>

    <div id="bottom-pane">
        <div id="hud-box">
            <div class="hud-row">
                <span class="hud-label">DIST</span>
                <span class="hud-value" id="hud-dist">0.00 km</span>
            </div>
            <div class="hud-row">
                <span class="hud-label">ALT</span>
                <span class="hud-value" id="hud-alt">0 m</span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        const map = L.map('bottom-pane').setView([38.052, 23.828], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let carMarker = null;
        let routeData = []; 
        let activeIndex = 0; 
        window.altChart = null; 

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const toRad = Math.PI / 180;
            const toDeg = 180 / Math.PI;
            const dLon = (lon2 - lon1) * toRad;
            const y = Math.sin(dLon) * Math.cos(lat2 * toRad);
            const x = Math.cos(lat1 * toRad) * Math.sin(lat2 * toRad) - Math.sin(lat1 * toRad) * Math.cos(lat2 * toRad) * Math.cos(dLon);
            return ((Math.atan2(y, x) * toDeg) + 360) % 360;
        }

        function findNearestPointIndex(lat, lon) {
            let minD = Infinity;
            let closestIdx = 0;
            for (let i = 0; i < routeData.length; i++) {
                let d = getDistance(lat, lon, routeData[i].lat, routeData[i].lon);
                if (d < minD) { minD = d; closestIdx = i; }
            }
            return closestIdx;
        }

        // --- MASTER BI-DIRECTIONAL SYNC ENGINE ---
        function updateUI(index, source) {
            if (index === activeIndex && source !== 'init') return;
            activeIndex = index;
            const dataPoint = routeData[index];

            // 1. Update HUD Box
            document.getElementById('hud-dist').innerText = dataPoint.dist + " km";
            document.getElementById('hud-alt').innerText = dataPoint.alt + " m";

            // 2. Update Map Position
            if (carMarker) {
                carMarker.setLatLng([dataPoint.lat, dataPoint.lon]);
                
                let carImageUrl = 'https://raw.githubusercontent.com/Pilirallyapp/stahemaster-map-chart/main/4x4.png';
                const updatedIcon = L.divIcon({
                    html: `<img src="${carImageUrl}" class="car-icon-img" style="transform: rotate(${dataPoint.bearing}deg);">`,
                    className: 'custom-car-div',
                    iconSize: [40, 40],
                    iconAnchor: [20, 20]
                });
                carMarker.setIcon(updatedIcon);
            }

            // 3. Force Chart Laser Line to jump to the new point
            if (window.altChart) {
                window.altChart.update('none'); 
            }
        }

        // --- HARD-CODED LASER TRACKER PLUGIN ---
        const verticalTrackerPlugin = {
            id: 'verticalTracker',
            afterDraw: chart => {
                if (activeIndex >= 0 && activeIndex < chart.data.labels.length) {
                    let ctx = chart.ctx;
                    
                    let meta = chart.getDatasetMeta(0);
                    if (!meta || !meta.data || !meta.data[activeIndex]) return;
                    
                    let x = meta.data[activeIndex].x;
                    let topY = chart.chartArea.top;
                    let bottomY = chart.chartArea.bottom;

                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(x, topY);
                    ctx.lineTo(x, bottomY);
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#ea4335'; 
                    ctx.stroke();
                    
                    let y = meta.data[activeIndex].y;
                    ctx.beginPath();
                    ctx.arc(x, y, 6, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ea4335';
                    ctx.fill();
                    ctx.restore();
                }
            }
        };

        const kmlUrl = "https://raw.githubusercontent.com/Pilirallyapp/stahemaster-map-chart/refs/heads/main/home-to-gini.kml";
        
        fetch(kmlUrl)
            .then(response => response.text())
            .then(kmlText => {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(kmlText, "text/xml");
                
                const lineString = xmlDoc.getElementsByTagName("LineString")[0];
                const coordinatesText = lineString.getElementsByTagName("coordinates")[0].textContent;
                const points = coordinatesText.trim().split(/\s+/);
                
                const latLngs = [];
                const chartLabels = [];
                const chartAltitudes = [];
                
                let cumulativeDistance = 0;
                let prevLat = null;
                let prevLon = null;
                
                points.forEach((point, index) => {
                    const [lon, lat, alt] = point.split(',');
                    if (lat && lon && alt) {
                        const currentLat = parseFloat(lat);
                        const currentLon = parseFloat(lon);
                        const currentAlt = parseFloat(alt);

                        if (prevLat !== null && prevLon !== null) {
                            cumulativeDistance += getDistance(prevLat, prevLon, currentLat, currentLon);
                        }

                        let bearing = 0;
                        if (index > 0 && prevLat !== null) {
                            bearing = getBearing(prevLat, prevLon, currentLat, currentLon);
                        }
                        
                        let distStr = cumulativeDistance.toFixed(2);
                        
                        routeData.push({
                            lat: currentLat,
                            lon: currentLon,
                            alt: Math.round(currentAlt),
                            dist: distStr,
                            bearing: Math.round(bearing)
                        });

                        latLngs.push([currentLat, currentLon]);
                        chartLabels.push(distStr);
                        chartAltitudes.push(currentAlt);

                        prevLat = currentLat;
                        prevLon = currentLon;
                    }
                });

                if (routeData.length > 1) {
                    routeData[0].bearing = routeData[1].bearing;
                }

                // Draw Red Route Line
                const routeLine = L.polyline(latLngs, { color: '#ea4335', weight: 10, opacity: 0.8 }).addTo(map);
                map.fitBounds(routeLine.getBounds());
                
                // Allow tapping anywhere on the red line to jump the car
                routeLine.on('click', function(e) {
                    const index = findNearestPointIndex(e.latlng.lat, e.latlng.lng);
                    updateUI(index, 'map_click');
                });
                
                // --- MAP SCRUBBING LOGIC (CAR SPECIFIC) ---
                let isScrubbing = false;
                const bottomPane = document.getElementById('bottom-pane');

                // Generate Car Marker
                let carImageUrl = 'https://raw.githubusercontent.com/Pilirallyapp/stahemaster-map-chart/main/4x4.png';
                let carIcon = L.divIcon({
                    html: `<img src="${carImageUrl}" class="car-icon-img" style="transform: rotate(${routeData[0].bearing}deg);">`,
                    className: 'custom-car-div',
                    iconSize: [40, 40],
                    iconAnchor: [20, 20]
                });
                
                carMarker = L.marker([routeData[0].lat, routeData[0].lon], {
                    icon: carIcon, 
                    zIndexOffset: 1000
                }).addTo(map);

                // Start scrubbing ONLY when touching the car
                carMarker.on('mousedown touchstart', function(e) {
                    L.DomEvent.stopPropagation(e);
                    isScrubbing = true;
                    map.dragging.disable(); // Freeze map only when grabbing car
                });

                // Raw DOM listener to track finger perfectly even when map is frozen
                function handleMove(e) {
                    if (!isScrubbing) return;
                    if (e.cancelable) e.preventDefault(); // Stop mobile screen scrolling
                    
                    let clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    let clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    
                    if (clientX && clientY) {
                        let rect = bottomPane.getBoundingClientRect();
                        let containerPoint = L.point(clientX - rect.left, clientY - rect.top);
                        let latlng = map.containerPointToLatLng(containerPoint);
                        
                        let index = findNearestPointIndex(latlng.lat, latlng.lng);
                        updateUI(index, 'map_drag');
                    }
                }

                bottomPane.addEventListener('mousemove', handleMove, { passive: false });
                bottomPane.addEventListener('touchmove', handleMove, { passive: false });

                function stopScrubbing() {
                    if (isScrubbing) {
                        isScrubbing = false;
                        map.dragging.enable(); // Unfreeze map
                    }
                }

                window.addEventListener('mouseup', stopScrubbing);
                window.addEventListener('touchend', stopScrubbing);

                // Build the Chart
                const ctx = document.getElementById('altitudeChart').getContext('2d');
                window.altChart = new Chart(ctx, {
                    type: 'line',
                    plugins: [verticalTrackerPlugin],
                    data: {
                        labels: chartLabels,
                        datasets: [{
                            label: 'Altitude (meters)',
                            data: chartAltitudes,
                            borderColor: '#bf953f',
                            backgroundColor: 'rgba(191, 149, 63, 0.2)',
                            fill: true,
                            tension: 0.2,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: false } 
                        },
                        scales: {
                            x: {
                                grid: { color: '#444' },
                                ticks: { color: '#aaa', maxTicksLimit: 10 }
                            },
                            y: {
                                grid: { color: '#444' },
                                ticks: { color: '#aaa' }
                            }
                        },
                        onHover: (event, elements) => {
                            if (elements && elements.length) {
                                updateUI(elements[0].index, 'chart');
                            }
                        }
                    }
                });

                // Start engine at position zero
                updateUI(0, 'init');
            })
            .catch(error => console.error("Error loading KML:", error));
    </script>
</body>
</html>
