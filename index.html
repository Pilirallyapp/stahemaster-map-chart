<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StageMaster - Route & Chart</title>
    <!-- Leaflet CSS for the map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Ensuring the body takes up the full screen height perfectly */
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            display: flex; 
            flex-direction: column; 
            font-family: sans-serif; 
        }
        
        /* Hard-coding the height to 50% so the map cannot collapse */
        #top-pane { 
            height: 50%; 
            border-bottom: 3px solid #333; 
            padding: 10px; 
            box-sizing: border-box; 
        }
        
        #bottom-pane { 
            height: 50%; 
            width: 100%;
        }
        
        canvas { 
            width: 100% !important; 
            height: 100% !important; 
        }
    </style>
</head>
<body>
    
    <!-- Top Half: Altitude Chart -->
    <div id="top-pane">
        <canvas id="altitudeChart"></canvas>
    </div>

    <!-- Bottom Half: Route Map -->
    <div id="bottom-pane"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        // 1. Initialize the map
        const map = L.map('bottom-pane').setView([38.052, 23.828], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Utility function to calculate distance between two coordinates in kilometers
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radius of the Earth in kilometers
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        // 2. Fetch the KML file
        const kmlUrl = "https://raw.githubusercontent.com/Pilirallyapp/stahemaster-map-chart/refs/heads/main/home-to-gini.kml";
        
        fetch(kmlUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }
                return response.text();
            })
            .then(kmlText => {
                console.log("KML data loaded successfully!");
                
                // 3. Parse XML
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(kmlText, "text/xml");
                
                // 4. Find the continuous path coordinates
                const lineString = xmlDoc.getElementsByTagName("LineString")[0];
                const coordinatesText = lineString.getElementsByTagName("coordinates")[0].textContent;
                
                // 5. Clean up spacing and split into points
                const points = coordinatesText.trim().split(/\s+/);
                
                // Arrays to hold our map and chart data
                const latLngs = [];
                const distances = [];
                const altitudes = [];
                
                let cumulativeDistance = 0;
                let prevLat = null;
                let prevLon = null;
                
                points.forEach(point => {
                    const [lon, lat, alt] = point.split(',');
                    if (lat && lon && alt) {
                        const currentLat = parseFloat(lat);
                        const currentLon = parseFloat(lon);
                        const currentAlt = parseFloat(alt);

                        // Save for map
                        latLngs.push([currentLat, currentLon]);
                        // Save for chart (Altitude)
                        altitudes.push(currentAlt);

                        // Calculate cumulative distance in kilometers
                        if (prevLat !== null && prevLon !== null) {
                            cumulativeDistance += getDistance(prevLat, prevLon, currentLat, currentLon);
                        }
                        distances.push(cumulativeDistance.toFixed(2));

                        prevLat = currentLat;
                        prevLon = currentLon;
                    }
                });

                // 6. Draw the red route line and zoom to fit
                const routeLine = L.polyline(latLngs, { color: 'red', weight: 5 }).addTo(map);
                map.fitBounds(routeLine.getBounds());

                // 7. Render the Altitude Chart
                const ctx = document.getElementById('altitudeChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: distances,
                        datasets: [{
                            label: 'Altitude (meters)',
                            data: altitudes,
                            borderColor: '#e74c3c',
                            backgroundColor: 'rgba(231, 76, 60, 0.2)',
                            fill: true,
                            tension: 0.1,
                            pointRadius: 0 // Hides the dots to make the line look like a smooth profile
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: {
                                title: { display: true, text: 'Distance (Kilometers)' },
                                ticks: { maxTicksLimit: 10 }
                            },
                            y: {
                                title: { display: true, text: 'Altitude' }
                            }
                        }
                    }
                });
            })
            .catch(error => console.error("Error loading KML:", error));
    </script>
</body>
</html>
