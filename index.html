<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StageMaster - Preview Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            display: flex; 
            flex-direction: column; 
            font-family: sans-serif; 
            background-color: #1a1a1a;
        }
        
        #top-pane { 
            height: 50%; 
            border-bottom: 4px solid #bf953f; 
            padding: 10px; 
            box-sizing: border-box; 
            background: #2d2d2d;
            position: relative;
        }
        
        #bottom-pane { 
            height: 50%; 
            width: 100%;
            position: relative;
        }
        
        canvas { 
            width: 100% !important; 
            height: 100% !important; 
        }

        /* --- THE HUD OVERLAY --- */
        #hud-box {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(20, 20, 20, 0.85);
            border: 2px solid #bf953f;
            border-radius: 12px;
            padding: 10px 15px;
            color: white;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: none; /* Lets you click through it to the map */
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            font-size: 1.1rem;
        }

        .hud-label {
            color: #aaa;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        
        .hud-value {
            color: #fbbc05;
            font-family: monospace;
            font-size: 1.3rem;
        }

        /* Smooth rotation for the car marker */
        .car-icon-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            transition: transform 0.1s linear; 
            /* Fallback shape in case image doesn't load yet */
            background-color: transparent; 
        }
    </style>
</head>
<body>
    
    <div id="top-pane">
        <canvas id="altitudeChart"></canvas>
    </div>

    <div id="bottom-pane">
        <!-- HUD Box injected over the map -->
        <div id="hud-box">
            <div class="hud-row">
                <span class="hud-label">DIST</span>
                <span class="hud-value" id="hud-dist">0.00 km</span>
            </div>
            <div class="hud-row">
                <span class="hud-label">ALT</span>
                <span class="hud-value" id="hud-alt">0 m</span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        const map = L.map('bottom-pane').setView([38.052, 23.828], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let carMarker = null;
        let routeData = []; 

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
        }

        // Bearing logic for the dynamic rotation
        function getBearing(lat1, lon1, lat2, lon2) {
            const toRad = Math.PI / 180;
            const toDeg = 180 / Math.PI;
            const dLon = (lon2 - lon1) * toRad;
            const y = Math.sin(dLon) * Math.cos(lat2 * toRad);
            const x = Math.cos(lat1 * toRad) * Math.sin(lat2 * toRad) - Math.sin(lat1 * toRad) * Math.cos(lat2 * toRad) * Math.cos(dLon);
            return ((Math.atan2(y, x) * toDeg) + 360) % 360;
        }

        // --- LASER TRACKER PLUGIN FOR CHART.JS ---
        const verticalTrackerPlugin = {
            id: 'verticalTracker',
            afterDraw: chart => {
                if (chart.tooltip?._active?.length) {
                    let x = chart.tooltip._active[0].element.x;
                    let yAxis = chart.scales.y;
                    let ctx = chart.ctx;
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(x, yAxis.top);
                    ctx.lineTo(x, yAxis.bottom);
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#ea4335'; // Red laser line
                    ctx.stroke();
                    ctx.restore();
                }
            }
        };

        const kmlUrl = "https://raw.githubusercontent.com/Pilirallyapp/stahemaster-map-chart/refs/heads/main/home-to-gini.kml";
        
        fetch(kmlUrl)
            .then(response => response.text())
            .then(kmlText => {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(kmlText, "text/xml");
                
                const lineString = xmlDoc.getElementsByTagName("LineString")[0];
                const coordinatesText = lineString.getElementsByTagName("coordinates")[0].textContent;
                const points = coordinatesText.trim().split(/\s+/);
                
                const latLngs = [];
                const chartLabels = [];
                const chartAltitudes = [];
                
                let cumulativeDistance = 0;
                let prevLat = null;
                let prevLon = null;
                
                // Parse points and build the master routeData array
                points.forEach((point, index) => {
                    const [lon, lat, alt] = point.split(',');
                    if (lat && lon && alt) {
                        const currentLat = parseFloat(lat);
                        const currentLon = parseFloat(lon);
                        const currentAlt = parseFloat(alt);

                        if (prevLat !== null && prevLon !== null) {
                            cumulativeDistance += getDistance(prevLat, prevLon, currentLat, currentLon);
                        }

                        // Calculate bearing to the NEXT point for rotation (or keep previous if at the end)
                        let bearing = 0;
                        if (index > 0 && prevLat !== null) {
                            bearing = getBearing(prevLat, prevLon, currentLat, currentLon);
                        }
                        
                        let distStr = cumulativeDistance.toFixed(2);
                        
                        routeData.push({
                            lat: currentLat,
                            lon: currentLon,
                            alt: Math.round(currentAlt),
                            dist: distStr,
                            bearing: Math.round(bearing)
                        });

                        latLngs.push([currentLat, currentLon]);
                        chartLabels.push(distStr);
                        chartAltitudes.push(currentAlt);

                        prevLat = currentLat;
                        prevLon = currentLon;
                    }
                });

                // Fix the bearing of the very first point to match the second point
                if (routeData.length > 1) {
                    routeData[0].bearing = routeData[1].bearing;
                }

                // Draw the line on the map
                const routeLine = L.polyline(latLngs, { color: '#1a73e8', weight: 6, opacity: 0.8 }).addTo(map);
                map.fitBounds(routeLine.getBounds());

                // Initialize the Car Marker at the start line
                // CHANGE THIS URL to your uploaded 4x4.png
                let carImageUrl = 'https://raw.githubusercontent.com/Pilirallyapp/stahemaster-map-chart/main/4x4.png';
                
                let carIcon = L.divIcon({
                    html: `<img src="${carImageUrl}" class="car-icon-img" style="transform: rotate(${routeData[0].bearing}deg);">`,
                    className: 'custom-car-div',
                    iconSize: [40, 40],
                    iconAnchor: [20, 20]
                });
                
                carMarker = L.marker([routeData[0].lat, routeData[0].lon], {icon: carIcon, zIndexOffset: 1000}).addTo(map);

                // Initialize the Chart
                const ctx = document.getElementById('altitudeChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    plugins: [verticalTrackerPlugin],
                    data: {
                        labels: chartLabels,
                        datasets: [{
                            label: 'Altitude (meters)',
                            data: chartAltitudes,
                            borderColor: '#bf953f',
                            backgroundColor: 'rgba(191, 149, 63, 0.2)',
                            fill: true,
                            tension: 0.2,
                            pointRadius: 0,
                            pointHoverRadius: 6,
                            pointHoverBackgroundColor: '#ea4335'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: false } // We disable the default tooltip so only the HUD shows
                        },
                        scales: {
                            x: {
                                grid: { color: '#444' },
                                ticks: { color: '#aaa', maxTicksLimit: 10 }
                            },
                            y: {
                                grid: { color: '#444' },
                                ticks: { color: '#aaa' }
                            }
                        },
                        // --- THE SYNC ENGINE ---
                        onHover: (event, elements) => {
                            if (elements && elements.length) {
                                const index = elements[0].index;
                                const dataPoint = routeData[index];

                                // 1. Update the HUD Box
                                document.getElementById('hud-dist').innerText = dataPoint.dist + " km";
                                document.getElementById('hud-alt').innerText = dataPoint.alt + " m";

                                // 2. Update Map Position
                                carMarker.setLatLng([dataPoint.lat, dataPoint.lon]);
                                
                                // 3. Update Car Rotation dynamically via inline CSS
                                const updatedIcon = L.divIcon({
                                    html: `<img src="${carImageUrl}" class="car-icon-img" style="transform: rotate(${dataPoint.bearing}deg);">`,
                                    className: 'custom-car-div',
                                    iconSize: [40, 40],
                                    iconAnchor: [20, 20]
                                });
                                carMarker.setIcon(updatedIcon);
                            }
                        }
                    }
                });
            })
            .catch(error => console.error("Error loading KML:", error));
    </script>
</body>
</html>
